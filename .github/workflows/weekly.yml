name: Dashboard semanal RHG

on:
  schedule:
    - cron: "0 11 * * 2"    # todos los martes 11:00 UTC (08:00 Argentina)
  workflow_dispatch:
    inputs:
      send_email:
        description: "Mandar mail al equipo (aunque no sea el cron automático)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Keep repo activo para GitHub cron
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive [skip ci]"
          git push

  build:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Generar dashboard
        env:
          TGN_USER: ${{ secrets.TGN_USER }}
          TGN_PASS: ${{ secrets.TGN_PASS }}
          TGN_LOGIN_URL: ${{ secrets.TGN_LOGIN_URL }}
          TGN_SEARCH_URL: ${{ secrets.TGN_SEARCH_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          NOTIFY_TEAM: ${{ secrets.NOTIFY_TEAM }}
          IS_SCHEDULED: ${{ github.event_name == 'schedule' || inputs.send_email == true }}
        run: |
          mkdir -p output
          python build.py || echo "build terminó con errores (ver mail)"

      - name: Preparar sitio
        run: |
          mkdir -p _site
          if [ -f output/index.html ]; then
            cp output/index.html _site/index.html
          else
            echo '<html><body style="font-family:sans-serif;padding:2rem"><h2>Dashboard en mantenimiento</h2><p>El update automático tuvo un error. Revisá el mail de notificación.</p></body></html>' > _site/index.html
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
